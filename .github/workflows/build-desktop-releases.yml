name: Build Desktop Releases

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            add_data_sep: ";"
            bundle_path: dist/PedalsConfigurator
            icon_arg: --icon icons/pedals.ico
          - os: macos-latest
            platform: macos
            add_data_sep: ":"
            bundle_path: dist/PedalsConfigurator.app
            icon_arg: ""
          - os: ubuntu-latest
            platform: linux
            add_data_sep: ":"
            bundle_path: dist/PedalsConfigurator
            icon_arg: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux GUI dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libdbus-1-3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build desktop app
        shell: bash
        env:
          ADD_DATA_SEP: ${{ matrix.add_data_sep }}
          ICON_ARG: ${{ matrix.icon_arg }}
        run: |
          python - <<'PY'
          import os
          import subprocess

          add_data_sep = os.environ["ADD_DATA_SEP"]
          icon_arg = os.environ["ICON_ARG"].strip()

          cmd = [
              "pyinstaller",
              "--noconfirm",
              "--clean",
              "--windowed",
              "--name",
              "PedalsConfigurator",
              "--add-data",
              f"icons{add_data_sep}icons",
              "--add-data",
              f"presets{add_data_sep}presets",
              "main.py",
          ]

          if icon_arg:
              cmd.extend(icon_arg.split())

          print("Running:", " ".join(cmd))
          subprocess.run(cmd, check=True)
          PY

      - name: Package build output
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          BUNDLE_PATH: ${{ matrix.bundle_path }}
        run: |
          python - <<'PY'
          import os
          import shutil
          from pathlib import Path

          platform = os.environ["PLATFORM"]
          bundle_path = Path(os.environ["BUNDLE_PATH"])
          dist_dir = Path("dist")
          archive_base = dist_dir / f"PedalsConfigurator-{platform}"

          if not bundle_path.exists():
              raise SystemExit(f"Missing build output: {bundle_path}")

          shutil.make_archive(
              str(archive_base),
              "zip",
              root_dir=bundle_path.parent,
              base_dir=bundle_path.name,
          )
          print(f"Created archive: {archive_base}.zip")
          PY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PedalsConfigurator-${{ matrix.platform }}
          path: dist/PedalsConfigurator-${{ matrix.platform }}.zip
          retention-days: 30

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show release assets
        run: find release-assets -maxdepth 3 -type f -print

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/PedalsConfigurator-windows/PedalsConfigurator-windows.zip
            release-assets/PedalsConfigurator-macos/PedalsConfigurator-macos.zip
            release-assets/PedalsConfigurator-linux/PedalsConfigurator-linux.zip
