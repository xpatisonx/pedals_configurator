name: Build Windows EXE

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows app
        run: >
          pyinstaller
          --noconfirm
          --clean
          --windowed
          --name PedalsConfigurator
          --icon icons/pedals.ico
          --add-data "icons;icons"
          --add-data "presets;presets"
          main.py

      - name: Package build output
        shell: pwsh
        run: |
          Compress-Archive -Path dist/PedalsConfigurator/* -DestinationPath dist/PedalsConfigurator-windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PedalsConfigurator-windows
          path: dist/PedalsConfigurator-windows.zip
          retention-days: 30
